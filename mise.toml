[tools]
# Rust toolchain — provides `cargo`/`rustc` on PATH. rules_rs builds Rust via
# Bazel's own registered toolchain, but a host cargo is handy for generating
# Cargo.lock files (e.g. when reproducing third-party crate issues) and for
# ad-hoc cargo/clippy/rustfmt. Pinned to match the version the test module uses.
rust = { version = "1.94.1", profile = "default", components = "clippy,rustfmt" }

# Bazel is the build/test driver for this repo. This pins the bazelisk
# *launcher*, not Bazel itself: bazelisk reads `.bazelversion`, which stays the
# single source of truth for the Bazel version.
bazelisk = "1.29.0"  # launcher only — Bazel version is pinned in .bazelversion

[tasks.test]
description = "Run the root module's tests (mirrors CI's `bazel test //...`)"
dir = "{{ config_root }}"
run = "bazel test //..."

[tasks.test-e2e]
description = "Run the end-to-end integration tests in the test/ module"
dir = "{{ config_root }}/test"
run = "bazel test //..."

[tasks.gazelle]
description = "Regenerate bzl_library BUILD targets (see CONTRIBUTING.md)"
dir = "{{ config_root }}"
run = "bazel run gazelle"
